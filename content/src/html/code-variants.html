<!DOCTYPE html>
<html>
<head>
  <title>Code Variants</title>
</head>
<body>
  <h1>Code Variants</h1>
  <p>Inline code example: <code>echo "hello"</code>.</p>

  <h2>Language class</h2>
  <pre><code class="language-python">def greet(name):
    return f"hello {name}"</code></pre>

  <h2>No class</h2>
  <pre><code>SELECT id, title FROM docs ORDER BY id;</code></pre>

  <h2>Non-standard class</h2>
  <pre><code class="code-snippet js">console.log("hello world");</code></pre>
</body>
</html>
