<!DOCTYPE html>
<html>
<head>
  <title>Admonition Variants</title>
</head>
<body>
  <h1>Admonition Variants</h1>

  <aside class="note">
    <h2>Note</h2>
    <p>This note uses a simple class name.</p>
  </aside>

  <div class="alert alert-warning">
    <strong>Warning:</strong>
    <p>This warning uses bootstrap-like classes.</p>
  </div>

  <section class="callout caution">
    <p class="callout-title">Caution</p>
    <p>This caution uses custom callout markup.</p>
  </section>
</body>
</html>
