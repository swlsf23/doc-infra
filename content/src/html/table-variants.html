<!DOCTYPE html>
<html lang="en">
<head>
  <title>Table Variants</title>
</head>
<body>
  <h1>Table Variants</h1>

  <h2>Simple table</h2>
  <table>
    <tr><th>Name</th><th>Value</th></tr>
    <tr><td>alpha</td><td>1</td></tr>
    <tr><td>beta</td><td>2</td></tr>
  </table>

  <h2>Thead and tbody</h2>
  <table class="data-table">
    <thead>
      <tr><th>Region</th><th>Status</th></tr>
    </thead>
    <tbody>
      <tr><td>us-east-1</td><td>ok</td></tr>
      <tr><td>us-west-2</td><td>degraded</td></tr>
    </tbody>
  </table>

  <h2>Wrapped table</h2>
  <div class="table-container wide">
    <table>
      <tr><th>Key</th><th>Description</th></tr>
      <tr><td>doc_root</td><td>Root folder for source content.</td></tr>
    </table>
  </div>
</body>
</html>
