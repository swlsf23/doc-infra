# Paths below are relative to this file's directory (code/) unless absolute.
input_dir: ../content/src
manifest_path: ../content/manifest.yml

# HTML output from convert.py: mirrors manifest paths with .html extension
html_output_dir: ../output/html

# Browsable site from build_site.py: raw HTML + nav + assets copied from ux_dir
site_output_dir: ../output/site
ux_dir: ../ux
# Repository URL for the header GitHub button. Omit or "" uses the built-in default.
# Set to false to hide the GitHub control entirely.
site_github_url: "https://github.com/swlsf23/doc-infra"

# Document converter id (see doc_infra.converters.registry)
converter: markdown

# convert.py when a target .html already exists: overwrite | skip | stop
# stop: refuse to run if any target file already exists (nothing written)
on_existing_html: overwrite

# What to do if manifest_path already exists: overwrite | stop | append
# append: keep existing sources (by path) and add any discovered .md files not already listed
on_existing_manifest: overwrite
